<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TCHAT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #000; color: white; height: 100vh; overflow: hidden; }

        /* FB Lite Style Loader */
        #loader-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center;
        }
        .dots-loader { display: flex; gap: 8px; }
        .dots-loader div {
            width: 12px; height: 12px; background: #8c442c; border-radius: 50%;
            animation: fb-bounce 0.6s infinite alternate;
        }
        .dots-loader div:nth-child(2) { animation-delay: 0.2s; }
        .dots-loader div:nth-child(3) { animation-delay: 0.4s; }
        @keyframes fb-bounce { to { transform: translateY(-10px); opacity: 0.3; } }

        /* Auth Pages */
        #auth-container { position: fixed; width: 100%; height: 100%; background: linear-gradient(135deg, #000 0%, #1a0c08 100%); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: rgba(28,20,16,0.95); padding: 40px 30px; border-radius: 40px; width: 90%; max-width: 380px; text-align: center; border: 1px solid rgba(140,68,44,0.3); }
        .app-logo { font-size: 28px; margin-bottom: 30px; color: #fff; font-weight: bold; background: linear-gradient(135deg, #fff, #8c442c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .auth-card input { width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(0,0,0,0.5); border: 1px solid #3d2b24; border-radius: 25px; color: white; outline: none; }
        .auth-card button { width: 100%; padding: 15px; background: linear-gradient(135deg, #8c442c, #5a2c1c); color: white; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; }
        .toggle-txt { margin-top: 15px; color: #f5d020; cursor: pointer; }

        /* Main Layout */
        #app-interface { height: 100vh; width: 100%; display: none; flex-direction: column; }
        .header { padding: 12px 15px; background: #0a0a0a; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .header h2 { font-size: 20px; color: #8c442c; font-weight: 800; cursor: pointer; }

        .page-content { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .hidden { display: none !important; }

        /* Post Creation */
        .create-post { background: #111; padding: 15px; border-bottom: 8px solid #222; }
        .post-input-row { display: flex; gap: 10px; }
        .post-avatar { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 1px solid #333; cursor: pointer; }
        #postText { flex: 1; background: #222; border: none; border-radius: 20px; padding: 10px 15px; color: white; outline: none; }
        .post-btn { background: #8c442c; color: white; border: none; padding: 8px 20px; border-radius: 20px; margin-top: 10px; float: right; font-weight: bold; cursor: pointer; }

        /* Post Card */
        .post-card { background: #000; border-bottom: 6px solid #1a1a1a; padding: 15px; }
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .post-user { font-weight: bold; font-size: 15px; cursor: pointer; }
        .post-time { font-size: 11px; opacity: 0.5; }
        .post-content { font-size: 15px; line-height: 1.4; margin-bottom: 10px; word-wrap: break-word; }
        
        .post-stats { display: flex; justify-content: space-between; padding: 5px 0; font-size: 12px; color: #aaa; border-bottom: 1px solid #222; }
        .post-actions { padding-top: 10px; display: flex; gap: 20px; color: #aaa; font-size: 14px; }
        .post-actions span { cursor: pointer; }
        .post-actions span.liked { color: #8c442c; font-weight: bold; }
        .del-btn { margin-left: auto; color: #ff4444; cursor: pointer; padding: 5px; }

        /* Comment Section */
        .comment-section { margin-top: 10px; background: #0a0a0a; border-radius: 10px; padding: 10px; display: none; }
        .comment-input-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .comment-input-row input { flex: 1; background: #222; border: none; border-radius: 15px; padding: 5px 12px; color: white; font-size: 13px; outline: none; }
        .comment-item { margin-bottom: 8px; font-size: 13px; display: flex; align-items: flex-start; gap: 5px; }
        .comment-user { font-weight: bold; color: #8c442c; cursor: pointer; }
        .cmt-actions { margin-left: auto; display: flex; gap: 8px; font-size: 11px; opacity: 0.6; }
        .cmt-actions i { cursor: pointer; }

        /* Profile Update */
        .profile-container { text-align: center; padding: 30px 20px; background: #111; margin-bottom: 10px; border-bottom: 1px solid #333; }
        .profile-pic-wrapper { position: relative; display: inline-block; }
        .big-prof-pic { width: 110px; height: 110px; border-radius: 50%; border: 3px solid #8c442c; object-fit: cover; }
        .cam-icon { position: absolute; bottom: 5px; right: 5px; background: #8c442c; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #111; cursor: pointer; }
        
        #msg-btn-prof { display: none; margin: 15px auto 0; padding: 8px 25px; background: #0084ff; color: white; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; }

        /* Floating Chat Button */
        #chat-toggle-btn { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: #8c442c; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 500; cursor: pointer; }

        /* Chat UI */
        #users-page, #inbox-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; flex-direction: column; }
        .chat-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #111; cursor: pointer; }
        .chat-item img { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; border: 1px solid #8c442c; object-fit: cover; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .message-wrapper { display: flex; width: 100%; }
        .message-wrapper.sent { justify-content: flex-end; }
        .message-bubble { max-width: 75%; padding: 10px 15px; border-radius: 18px; font-size: 14px; word-wrap: break-word; }
        .message-bubble.sent { background: #0084ff; border-bottom-right-radius: 2px; }
        .message-bubble.received { background: #262626; border-bottom-left-radius: 2px; }
        .chat-footer { padding: 10px; background: #0a0a0a; display: flex; gap: 10px; border-top: 1px solid #222; }
        #messageInput { flex: 1; background: #1a1a1a; border: 1px solid #333; padding: 10px 18px; border-radius: 25px; color: white; outline: none; }
    </style>
</head>
<body>

    <div id="loader-overlay" class="hidden">
        <div class="dots-loader">
            <div></div><div></div><div></div>
        </div>
    </div>

    <div id="auth-container">
        <div id="login-form" class="auth-card">
            <h1 class="app-logo">TCHAT</h1>
            <input type="text" id="loginEmailPhone" placeholder="Email or Phone">
            <input type="password" id="loginPass" placeholder="Password">
            <button onclick="login()">Login</button>
            <p class="toggle-txt" onclick="toggleAuth(true)">Create New Account</p>
        </div>
        <div id="reg-form" class="auth-card" style="display:none;">
            <h1 class="app-logo">✨ Register ✨</h1>
            <input type="text" id="regEmailPhone" placeholder="Email or Phone">
            <input type="password" id="regPass" placeholder="Password">
            <button onclick="register()">Register</button>
            <p class="toggle-txt" onclick="toggleAuth(false)">Back to Login</p>
        </div>
    </div>

    <div id="app-interface">
        <div class="header">
            <img id="myPic" class="post-avatar" src="" onclick="showMyProfile()">
            <h2 onclick="showNewsfeed()">Feed</h2>
            <i class="fas fa-sign-out-alt" onclick="logout()" style="color:#8c442c; font-size: 18px;"></i>
        </div>

        <div id="newsfeed-page" class="page-content">
            <div class="create-post">
                <div class="post-input-row">
                    <img id="postMyPic" class="post-avatar" src="" onclick="showMyProfile()">
                    <input type="text" id="postText" placeholder="What's on your mind?">
                </div>
                <button class="post-btn" onclick="createPost()">Post</button>
                <div style="clear:both;"></div>
            </div>
            <div id="feed-container"></div>
        </div>

        <div id="profile-page" class="page-content hidden">
            <div class="header">
                <i class="fas fa-arrow-left" onclick="showNewsfeed()" style="cursor:pointer;"></i>
                <h2 style="margin-left: 15px; flex: 1;">Profile</h2>
            </div>
            <div class="profile-container">
                <div class="profile-pic-wrapper">
                    <img id="profPic" class="big-prof-pic" src="">
                    <label id="cam-label" for="fileInput" class="cam-icon">
                        <i class="fas fa-camera"></i>
                    </label>
                    <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="uploadPhoto(event)">
                </div>
                <div style="display: flex; align-items: center; justify-content: center; margin-top:15px;">
                    <h3 id="profName" style="font-size: 22px;">Name</h3>
                    <i id="edit-name-icon" class="fas fa-pen" style="margin-left: 10px; color:#8c442c; cursor:pointer;" onclick="changeName()"></i>
                </div>
                <button id="msg-btn-prof">Message</button>
                <p id="prof-tip" style="font-size: 13px; color: #8c442c; margin-top: 5px;"></p>
            </div>
            <div id="user-posts-container"></div>
        </div>

        <div id="chat-toggle-btn" onclick="openChatList()">
            <i class="fas fa-comment-dots"></i>
        </div>
    </div>

    <div id="users-page" class="hidden">
        <div class="header">
            <i class="fas fa-arrow-left" onclick="closeChatList()"></i>
            <h2 style="margin-left: 15px; flex: 1;">Messages</h2>
        </div>
        <div id="users-list"></div>
    </div>

    <div id="inbox-page" class="hidden">
        <div class="header">
            <i class="fas fa-arrow-left" onclick="closeInbox()"></i>
            <img id="pPic" class="post-avatar" style="margin-left:15px; cursor:pointer;" src="" onclick="visitFromInbox()">
            <div style="margin-left:12px; flex:1;">
                <h4 id="pName" style="font-size: 15px; cursor:pointer;" onclick="visitFromInbox()">Name</h4>
            </div>
        </div>
        <div id="chat-box"></div>
        <div class="chat-footer">
            <input type="text" id="messageInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()" style="background:transparent; border:none; color:#0084ff; font-size:22px;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, get, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAT22X04lwGjaneGGW9sKzeO6hWVAA3n6g",
            authDomain: "tchat-a9707.firebaseapp.com",
            databaseURL: "https://tchat-a9707-default-rtdb.firebaseio.com",
            projectId: "tchat-a9707",
            storageBucket: "tchat-a9707.firebasestorage.app",
            messagingSenderId: "324756549796",
            appId: "1:324756549796:web:f557ebab16be9e5545f631"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentUser = JSON.parse(localStorage.getItem('user')) || null;
        let currentChatId = null;
        let activeChatPartner = null; 
        const defaultPic = "https://cdn-icons-png.flaticon.com/512/149/149071.png";

        // --- Loader Logic ---
        function toggleLoader(show) {
            const loader = document.getElementById('loader-overlay');
            if (show) loader.classList.remove('hidden');
            else loader.classList.add('hidden');
        }

        // --- Back Button Logic ---
        window.addEventListener('popstate', () => {
            const inbox = document.getElementById('inbox-page');
            const users = document.getElementById('users-page');
            const profile = document.getElementById('profile-page');
            if (!inbox.classList.contains('hidden')) closeInbox();
            else if (!users.classList.contains('hidden')) closeChatList();
            else if (!profile.classList.contains('hidden')) showNewsfeed();
        });

        function pushState() { if (window.history.state !== "app") history.pushState("app", ""); }

        // --- AUTH ---
        window.toggleAuth = (reg) => {
            document.getElementById('login-form').style.display = reg ? 'none' : 'block';
            document.getElementById('reg-form').style.display = reg ? 'block' : 'none';
        }

        window.login = async () => {
            const ep = document.getElementById('loginEmailPhone').value.trim();
            const ps = document.getElementById('loginPass').value.trim();
            if(!ep || !ps) return;
            toggleLoader(true);
            const snap = await get(ref(db, 'users'));
            let found = null;
            snap.forEach(c => { if(c.val().emailPhone === ep && c.val().password === ps) found = c.val(); });
            if(found) { localStorage.setItem('user', JSON.stringify(found)); location.reload(); }
            else { toggleLoader(false); alert("Invalid login!"); }
        }

        window.register = async () => {
            const ep = document.getElementById('regEmailPhone').value.trim();
            const ps = document.getElementById('regPass').value.trim();
            if(!ep || !ps) return;
            toggleLoader(true);
            const id = 'user_' + Date.now();
            const user = { id, emailPhone: ep, username: ep.split('@')[0], password: ps, profilePic: defaultPic };
            await set(ref(db, 'users/'+id), user);
            localStorage.setItem('user', JSON.stringify(user));
            location.reload();
        }

        window.logout = () => { localStorage.clear(); location.reload(); }

        // --- PROFILE LOGIC ---
        window.visitProfile = async (uid) => {
            toggleLoader(true);
            const snap = await get(ref(db, 'users/' + uid));
            if(!snap.exists()) { toggleLoader(false); return; }
            const userData = snap.val();
            pushState();
            
            // Hide other pages
            document.getElementById('newsfeed-page').classList.add('hidden');
            document.getElementById('users-page').classList.add('hidden');
            document.getElementById('inbox-page').classList.add('hidden');
            document.getElementById('profile-page').classList.remove('hidden');
            
            document.getElementById('profPic').src = userData.profilePic || defaultPic;
            document.getElementById('profName').innerText = userData.username;
            
            const isMe = uid === currentUser.id;
            document.getElementById('cam-label').style.display = isMe ? 'flex' : 'none';
            document.getElementById('edit-name-icon').style.display = isMe ? 'block' : 'none';

            const msgBtn = document.getElementById('msg-btn-prof');
            if(!isMe) {
                msgBtn.style.display = 'block';
                msgBtn.onclick = () => openInbox(userData);
            } else msgBtn.style.display = 'none';

            // Real-time load posts for this profile
            onValue(ref(db, 'posts'), (snap) => {
                const userFeed = document.getElementById('user-posts-container');
                userFeed.innerHTML = "";
                let posts = [];
                snap.forEach(c => { 
                    const p = c.val();
                    if(p.uid === uid) posts.push({id: c.key, ...p}); 
                });
                posts.reverse().forEach(p => { userFeed.innerHTML += generatePostHTML(p); });
                toggleLoader(false);
            });
        }

        window.showMyProfile = () => visitProfile(currentUser.id);
        window.showNewsfeed = () => {
            document.getElementById('profile-page').classList.add('hidden');
            document.getElementById('newsfeed-page').classList.remove('hidden');
        }
        window.visitFromInbox = () => { if(activeChatPartner) visitProfile(activeChatPartner.id); }

        // --- POST & ACTIONS ---
        function generatePostHTML(p) {
            const likeCount = p.likes ? Object.keys(p.likes).length : 0;
            const cmtCount = p.comments ? Object.keys(p.comments).length : 0;
            const isLiked = p.likes && p.likes[currentUser.id];

            let cmtHtml = "";
            if(p.comments) {
                Object.keys(p.comments).forEach(cid => {
                    const c = p.comments[cid];
                    cmtHtml += `
                    <div class="comment-item">
                        <span class="comment-user" onclick="visitProfile('${c.uid}')">${c.name}:</span> ${c.text}
                        ${c.uid === currentUser.id ? `
                        <div class="cmt-actions">
                            <i class="fas fa-trash" onclick="deleteComment('${p.id}', '${cid}')"></i>
                        </div>` : ''}
                    </div>`;
                });
            }

            return `
            <div class="post-card">
                <div class="post-header">
                    <img src="${p.pic || defaultPic}" class="post-avatar" onclick="visitProfile('${p.uid}')">
                    <div><div class="post-user" onclick="visitProfile('${p.uid}')">${p.name}</div><div class="post-time">${new Date(p.timestamp).toLocaleString()}</div></div>
                    ${p.uid === currentUser.id ? `<i class="fas fa-trash-alt del-btn" onclick="deletePost('${p.id}')"></i>` : ''}
                </div>
                <div class="post-content">${p.text}</div>
                <div class="post-stats"><span><i class="fas fa-thumbs-up"></i> ${likeCount}</span><span>${cmtCount} Comments</span></div>
                <div class="post-actions">
                    <span class="${isLiked?'liked':''}" onclick="toggleLike('${p.id}')"><i class="fas fa-thumbs-up"></i> Like</span>
                    <span onclick="showComments('${p.id}')"><i class="fas fa-comment"></i> Comment</span>
                </div>
                <div class="comment-section" id="comments-${p.id}">
                    <div id="comment-list-${p.id}">${cmtHtml}</div>
                    <div class="comment-input-row">
                        <input type="text" id="cmt-inp-${p.id}" placeholder="Write a comment...">
                        <i class="fas fa-paper-plane" onclick="addComment('${p.id}')" style="color:#8c442c; margin-top:5px; cursor:pointer;"></i>
                    </div>
                </div>
            </div>`;
        }

        window.createPost = async () => {
            const txt = document.getElementById('postText').value.trim();
            if(!txt) return;
            toggleLoader(true);
            await push(ref(db, 'posts'), {
                uid: currentUser.id, name: currentUser.username,
                pic: currentUser.profilePic || defaultPic,
                text: txt, timestamp: Date.now()
            });
            document.getElementById('postText').value = "";
            toggleLoader(false);
        }

        window.toggleLike = async (pid) => {
            const postRef = ref(db, `posts/${pid}/likes/${currentUser.id}`);
            const snap = await get(postRef);
            if(snap.exists()) await remove(postRef); else await set(postRef, true);
        }

        window.addComment = async (pid) => {
            const inp = document.getElementById(`cmt-inp-${pid}`);
            const txt = inp.value.trim();
            if(!txt) return;
            await push(ref(db, `posts/${pid}/comments`), {
                uid: currentUser.id, name: currentUser.username, text: txt, timestamp: Date.now()
            });
            inp.value = "";
        }

        window.showComments = (pid) => {
            const el = document.getElementById(`comments-${pid}`);
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        }

        window.deletePost = (pid) => { if(confirm("Delete this post?")) remove(ref(db, 'posts/' + pid)); }
        window.deleteComment = (pid, cid) => { if(confirm("Delete comment?")) remove(ref(db, `posts/${pid}/comments/${cid}`)); }

        // --- CHAT ---
        window.openChatList = () => { pushState(); document.getElementById('users-page').classList.remove('hidden'); }
        window.closeChatList = () => document.getElementById('users-page').classList.add('hidden');
        window.closeInbox = () => { document.getElementById('inbox-page').classList.add('hidden'); activeChatPartner = null; }

        window.openInbox = (user) => {
            toggleLoader(true);
            activeChatPartner = user;
            pushState();
            document.getElementById('users-page').classList.add('hidden');
            document.getElementById('profile-page').classList.add('hidden');
            document.getElementById('inbox-page').classList.remove('hidden');
            document.getElementById('pName').innerText = user.username;
            document.getElementById('pPic').src = user.profilePic || defaultPic;
            
            const ids = [currentUser.id, user.id].sort();
            currentChatId = ids[0] + '_' + ids[1];
            
            onValue(ref(db, 'chats/'+currentChatId), (snap) => {
                const box = document.getElementById('chat-box');
                box.innerHTML = "";
                snap.forEach(c => {
                    const m = c.val();
                    const isSent = m.sender === currentUser.id;
                    box.innerHTML += `<div class="message-wrapper ${isSent?'sent':'received'}"><div class="message-bubble ${isSent?'sent':'received'}">${m.text}</div></div>`;
                });
                box.scrollTop = box.scrollHeight;
                toggleLoader(false);
            });
        }

        window.sendMessage = async () => {
            const input = document.getElementById('messageInput');
            if(!input.value.trim()) return;
            await push(ref(db, 'chats/'+currentChatId), { sender: currentUser.id, text: input.value, timestamp: Date.now() });
            input.value = "";
        }

        // --- PHOTO & NAME ---
        window.uploadPhoto = (event) => {
            const file = event.target.files[0];
            if (!file) return;
            toggleLoader(true);
            const reader = new FileReader();
            reader.onload = async (e) => {
                const img = e.target.result;
                await update(ref(db, 'users/' + currentUser.id), { profilePic: img });
                currentUser.profilePic = img;
                localStorage.setItem('user', JSON.stringify(currentUser));
                location.reload();
            };
            reader.readAsDataURL(file);
        };

        window.changeName = async () => {
            const newName = prompt("Enter new name:", currentUser.username);
            if (newName && newName.trim() !== "") {
                toggleLoader(true);
                await update(ref(db, 'users/' + currentUser.id), { username: newName.trim() });
                currentUser.username = newName.trim();
                localStorage.setItem('user', JSON.stringify(currentUser));
                location.reload();
            }
        };

        // --- INIT ---
        if(currentUser) {
            toggleLoader(true);
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('app-interface').style.display = 'flex';
            document.getElementById('myPic').src = currentUser.profilePic || defaultPic;
            document.getElementById('postMyPic').src = currentUser.profilePic || defaultPic;
            
            // Feed
            onValue(ref(db, 'posts'), (snap) => {
                const feed = document.getElementById('feed-container');
                feed.innerHTML = "";
                let posts = [];
                snap.forEach(c => { posts.push({id: c.key, ...c.val()}); });
                posts.reverse().forEach(p => { feed.innerHTML += generatePostHTML(p); });
                toggleLoader(false);
            });

            // Users List
            onValue(ref(db, 'users'), (snap) => {
                const list = document.getElementById('users-list');
                list.innerHTML = "";
                snap.forEach(c => {
                    const u = c.val();
                    if(u.id !== currentUser.id) {
                        const div = document.createElement('div');
                        div.className = 'chat-item';
                        div.innerHTML = `<img src="${u.profilePic || defaultPic}"><div><h4>${u.username}</h4><small>Tap to chat</small></div>`;
                        div.onclick = () => openInbox(u);
                        list.appendChild(div);
                    }
                });
            });
        }
    </script>
</body>
</html>

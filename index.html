<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Messenger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-container" class="auth-card">
        <h2>Messenger</h2>
        <input type="text" id="regName" placeholder="Full Name">
        <input type="email" id="regEmail" placeholder="Gmail Address">
        <input type="tel" id="regPhone" placeholder="Phone Number (ID)">
        <input type="password" id="regPass" placeholder="Password">
        <button id="authBtn">Start Chatting</button>
    </div>

    <div id="chat-interface" style="display:none;">
        <div class="sidebar">
            <div class="header">
                <img id="myPic" src="" class="nav-avatar">
                <h3 id="myName">User</h3>
                <button id="logoutBtn">Logout</button>
            </div>
            <div id="users-list"></div>
            <div class="footer-settings">
                <button onclick="document.getElementById('edit-modal').style.display='flex'">Settings</button>
            </div>
        </div>

        <div class="chat-area">
            <div id="chat-header">Select a friend to chat</div>
            <div id="chat-box"></div>
            <div id="typing-text" style="padding-left: 20px; font-size: 12px; color: #42b72a; height: 15px;"></div>
            <div class="input-area" id="input-section" style="display:none;">
                <input type="text" id="messageInput" placeholder="Type a message...">
                <button id="sendBtn">Send</button>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3>Update Profile</h3>
            <input type="text" id="newName" placeholder="New Name">
            <input type="text" id="newPic" placeholder="New Photo URL">
            <button id="updateBtn">Update</button>
            <button id="deleteBtn" style="background:red;">Delete Account</button>
            <button onclick="this.parentElement.parentElement.style.display='none'">Close</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, get, update, onDisconnect, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAT22X04lwGjaneGGW9sKzeO6hWVAA3n6g",
        authDomain: "tchat-a9707.firebaseapp.com",
        databaseURL: "https://tchat-a9707-default-rtdb.firebaseio.com",
        projectId: "tchat-a9707",
        storageBucket: "tchat-a9707.firebasestorage.app",
        messagingSenderId: "324756549796",
        appId: "1:324756549796:web:f557ebab16be9e5545f631"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let currentUser = JSON.parse(localStorage.getItem('user')) || null;
    let currentChatId = null;
    let selectedPic = "";
    let msgListener = null;

    const avatars = [
        "https://cdn-icons-png.flaticon.com/512/149/149071.png",
        "https://cdn-icons-png.flaticon.com/512/147/147144.png",
        "https://cdn-icons-png.flaticon.com/512/168/168726.png",
        "https://cdn-icons-png.flaticon.com/512/219/219970.png",
        "https://cdn-icons-png.flaticon.com/512/188/188987.png",
        "https://cdn-icons-png.flaticon.com/512/163/163821.png"
    ];

    // --- NEW: Real-time Presence Logic ---
    function setupPresence(userId) {
        const statusRef = ref(db, 'users/' + userId + '/status');
        const connectedRef = ref(db, '.info/connected');

        onValue(connectedRef, (snap) => {
            if (snap.val() === true) {
                // ইউজার কানেক্টেড হলে স্ট্যাটাস 'online' হবে
                set(statusRef, 'online');
                // অ্যাপ বন্ধ বা ডিসকানেক্ট হলে অটোমেটিক 'offline' হয়ে যাবে
                onDisconnect(statusRef).set('offline');
            }
        });
    }

    window.toggleAuth = (reg) => {
        document.getElementById('login-form').style.display = reg ? 'none' : 'block';
        document.getElementById('reg-form').style.display = reg ? 'block' : 'none';
    }

    window.register = async () => {
        const ep = document.getElementById('regEmailPhone').value;
        const ps = document.getElementById('regPass').value;
        if(!ep || !ps) return alert("Fill fields");
        const id = 'user_' + Date.now();
        const user = { 
            id, 
            emailPhone: ep, 
            username: ep.split('@')[0], 
            password: ps, 
            profilePic: avatars[0],
            status: 'online' 
        };
        await set(ref(db, 'users/'+id), user);
        loginOk(user);
    }

    window.login = async () => {
        const ep = document.getElementById('loginEmailPhone').value;
        const ps = document.getElementById('loginPass').value;
        const snap = await get(ref(db, 'users'));
        let found = null;
        snap.forEach(c => { if(c.val().emailPhone === ep && c.val().password === ps) found = c.val(); });
        if(found) loginOk(found); else alert("Wrong!");
    }

    function loginOk(user) {
        localStorage.setItem('user', JSON.stringify(user));
        location.reload();
    }

    function start() {
        if(!currentUser) return;
        document.getElementById('auth-container').classList.add('hidden');
        document.getElementById('app-interface').style.display = 'block';
        document.getElementById('myPic').src = currentUser.profilePic;
        
        setupPresence(currentUser.id); // স্ট্যাটাস ট্র্যাকিং শুরু
        loadUsers();
    }

    function loadUsers() {
        onValue(ref(db, 'users'), (snap) => {
            const list = document.getElementById('users-list');
            list.innerHTML = "";
            snap.forEach(c => {
                const u = c.val();
                if(u.id !== currentUser.id) {
                    const isOnline = u.status === 'online';
                    const div = document.createElement('div');
                    div.className = 'chat-item';
                    div.innerHTML = `
                        <img src="${u.profilePic}">
                        <div>
                            <h4>${u.username}</h4>
                            <small style="color:${isOnline ? '#4caf50' : '#888'}">
                                ${isOnline ? '● Online' : '○ Offline'}
                            </small>
                        </div>`;
                    div.onclick = () => openInbox(u);
                    list.appendChild(div);
                }
            });
        });
    }

    window.openInbox = (user) => {
        document.getElementById('chat-box').innerHTML = "<div style='text-align:center; color:#8c442c; padding:20px;'><i class='fas fa-spinner fa-spin'></i> Loading...</div>"; 
        
        document.getElementById('users-page').classList.add('hidden');
        document.getElementById('inbox-page').classList.remove('hidden');
        document.getElementById('pName').innerText = user.username;
        document.getElementById('pPic').src = user.profilePic;

        // রিলে-টাইম স্ট্যাটাস আপডেট ইনবক্সেও দেখাবে
        onValue(ref(db, 'users/' + user.id + '/status'), (snap) => {
            const s = snap.val();
            const statusEl = document.querySelector('#inbox-page small');
            if(statusEl) {
                statusEl.innerText = s === 'online' ? 'Online' : 'Offline';
                statusEl.style.color = s === 'online' ? '#4caf50' : '#888';
            }
        });

        const ids = [currentUser.id, user.id].sort();
        currentChatId = ids[0] + '_' + ids[1];
        
        if(msgListener) msgListener();
        msgListener = onValue(ref(db, 'chats/'+currentChatId), (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.forEach(c => {
                const m = c.val();
                const isSent = m.sender === currentUser.id;
                const d = document.createElement('div');
                d.className = `message-wrapper ${isSent ? 'sent' : 'received'}`;
                d.innerHTML = `
                    ${!isSent ? `<img src="${user.profilePic}" class="message-avatar">`:''}
                    <div class="message-bubble ${isSent?'sent':'received'}">
                        ${m.text}
                        ${isSent ? `<span class="msg-status"><i class="fas fa-check-double"></i> Sent</span>` : ''}
                    </div>`;
                box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    window.sendMessage = async () => {
        const input = document.getElementById('messageInput');
        const box = document.getElementById('chat-box');
        const msgText = input.value.trim();
        
        if(!msgText) return;

        const tempId = "temp_" + Date.now();
        const d = document.createElement('div');
        d.id = tempId;
        d.className = `message-wrapper sent`;
        d.style.opacity = "0.7";
        d.innerHTML = `
            <div class="message-bubble sent">
                ${msgText}
                <span class="msg-status" id="status_${tempId}"><i class="fas fa-clock"></i> Sending...</span>
            </div>`;
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;

        input.value = "";

        try {
            await push(ref(db, 'chats/'+currentChatId), { 
                sender: currentUser.id, 
                text: msgText, 
                timestamp: serverTimestamp() // সার্ভার টাইম ব্যবহার করা ভালো
            });
            
            const statusEl = document.getElementById(`status_${tempId}`);
            if(statusEl) statusEl.innerHTML = `<i class="fas fa-check-double"></i> Sent`;
            document.getElementById(tempId).style.opacity = "1";

        } catch(e) {
            const statusEl = document.getElementById(`status_${tempId}`);
            if(statusEl) {
                statusEl.innerHTML = `<i class="fas fa-exclamation-circle"></i> Failed`;
                statusEl.style.color = "#ff4444";
            }
        }
    }

    // প্রোফাইল আপডেট ও বাকি ফাংশনগুলো অপরিবর্তিত রাখা হয়েছে...
    window.openSettings = () => {
        document.getElementById('settings-modal').style.display = 'flex';
        document.getElementById('editName').value = currentUser.username;
        document.getElementById('editPreview').src = currentUser.profilePic;
        selectedPic = currentUser.profilePic;
        const gal = document.getElementById('profileGallery');
        gal.innerHTML = "";
        avatars.forEach(a => {
            const img = document.createElement('img');
            img.src = a;
            img.className = 'gallery-item' + (a === selectedPic ? ' selected':'');
            img.onclick = () => {
                selectedPic = a;
                document.getElementById('editPreview').src = a;
                document.querySelectorAll('.gallery-item').forEach(i => i.classList.remove('selected'));
                img.classList.add('selected');
            };
            gal.appendChild(img);
        });
    }

    window.saveProfile = async () => {
        const name = document.getElementById('editName').value;
        await update(ref(db, 'users/'+currentUser.id), { username: name, profilePic: selectedPic });
        currentUser.username = name;
        currentUser.profilePic = selectedPic;
        localStorage.setItem('user', JSON.stringify(currentUser));
        document.getElementById('myPic').src = selectedPic;
        closeSettings();
    }

    window.closeSettings = () => document.getElementById('settings-modal').style.display = 'none';
    window.closeInbox = () => { document.getElementById('inbox-page').classList.add('hidden'); document.getElementById('users-page').classList.remove('hidden'); }
    
    window.logout = async () => { 
        // লগআউট করার আগে স্ট্যাটাস অফলাইন করে দিচ্ছি
        if(currentUser) await set(ref(db, 'users/' + currentUser.id + '/status'), 'offline');
        localStorage.clear(); 
        location.reload(); 
    }

    start();
</script>

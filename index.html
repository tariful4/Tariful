<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Chat App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-container">
        <h2>Register / Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="email" id="email" placeholder="Gmail">
        <input type="tel" id="phone" placeholder="Phone Number">
        <input type="password" id="password" placeholder="Password">
        <button id="registerBtn">Register & Login</button>
    </div>

    <div id="chat-container" style="display:none;">
        <h2 id="welcome-user">Welcome</h2>
        
        <div id="search-section">
            <input type="text" id="searchUser" placeholder="Search by Phone/Gmail">
            <button id="searchBtn">Find User</button>
        </div>

        <div id="chat-box">
            </div>

        <div id="input-area">
            <input type="text" id="messageInput" placeholder="Type a message...">
            <button id="sendBtn">Send</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
